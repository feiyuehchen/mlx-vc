# 自動發佈到 PyPI：當你在 GitHub 上建立 Release 時，
# 這個 workflow 會自動打包並上傳到 PyPI，
# 使用者就可以 pip install mlx-vc 安裝。
name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
