name: Feature request
description: Request a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: What problem does this solve?
      description: Describe the use case.  "I want to use mlx-vc for X but currently have to do Y."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work?  Sketch the API or behaviour you'd expect.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you try / consider?

  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: I'm willing to open a PR for this if the proposal is accepted
